version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Note: We haven't created a specific Dockerfile for web in this task list 
      # but standard Next.js dev usually runs locally. 
      # For the sake of "running together", we often run web on host or in a simple node container.
      # Let's assume for this compose we want to run both.
      # However, since I was not explicitly asked for a Web Dockerfile in the prompt (only backend),
      # I will configure this to use a standard node image mapping the current directory
      # OR just comment it out to suggest running web locally while api runs in docker (hybrid).
      
      # ACTUALLY, usually in dev for Next.js it's better to run on host for HMR speed.
      # But to fulfill "run frontend and backend together locally" via docker-compose:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev --filter web"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    volumes:
      - ./:/app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
